<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Single Camera Playback + Bookmarks</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
    body { font-family: Arial; background:#111; color:#eee; padding:20px; }
    h2 { text-align:center; margin-bottom:15px; }
    .controls { background:#222; padding:15px; border-radius:10px; max-width:600px; margin:auto; margin-bottom:20px; }
    input, select { padding:10px; border-radius:6px; border:none; font-size:14px; width:100%; margin-bottom:10px; }
    button { padding:10px; border-radius:6px; border:none; cursor:pointer; font-weight:bold; margin-right:5px; }
    .btnPlay { background:#28a745; color:white; }
    .btnStop { background:#dc3545; color:white; }
    .btnBookmark { background:#ff9800; color:black; }
    .btnShowBookmark { background:#9c27b0; color:white; }
    video { width:100%; height:300px; background:black; border-radius:8px; margin-top:10px; }
    .bookmarkBox { margin-top:10px; background:#111; padding:10px; border-radius:8px; max-height:180px; overflow-y:auto; }
    .bookmarkItem { background:#222; padding:8px; border-radius:6px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
    .bookmarkItem span { cursor:pointer; color:#00c3ff; flex:1; }
    .bookmarkItem span:hover { text-decoration:underline; }
</style>
</head>
<body>

<h2>🎥 Single Camera Playback + Bookmarks</h2>

<div class="controls">
    <input id="cameraIdInput" type="number" placeholder="Enter Camera ID (Example: 3)">
    <input id="startDt" type="datetime-local" value="2026-02-05T00:00:00">
    <input id="endDt" type="datetime-local" value="2026-02-05T23:59:59">

    <div style="margin-top:10px;">
        <button class="btnPlay" onclick="startCamera()">▶ Play</button>
        <button class="btnStop" onclick="stopCamera()">🛑 Stop</button>
        <button class="btnBookmark" onclick="addBookmark()">⭐ Add Bookmark</button>
        <button class="btnShowBookmark" onclick="loadBookmarks()">📌 Show Bookmarks</button>
    </div>
</div>

<video id="video" controls></video>
<div id="bookmarkBox" class="bookmarkBox"><i>No bookmarks loaded...</i></div>

<script>
const BASE_URL = "http://192.168.11.131:8081";
let player = { video: document.getElementById("video"), hls: null, blobUrl: null, sessionId: null };

function formatLocalDateTime(dateObj) {
    const yyyy = dateObj.getFullYear();
    const mm = String(dateObj.getMonth()+1).padStart(2,'0');
    const dd = String(dateObj.getDate()).padStart(2,'0');
    const hh = String(dateObj.getHours()).padStart(2,'0');
    const min = String(dateObj.getMinutes()).padStart(2,'0');
    const ss = String(dateObj.getSeconds()).padStart(2,'0');
    return `${yyyy}-${mm}-${dd}T${hh}:${min}:${ss}`;
}

async function startCamera() {
    const cameraId = document.getElementById("cameraIdInput").value;
    const start = document.getElementById("startDt").value;
    const end = document.getElementById("endDt").value;
    if(!cameraId || !start || !end) return alert("Camera ID, Start and End required!");


    const apiUrl = `${BASE_URL}/api/playback/hls/playlist/${cameraId}?start=${start}&end=${end}`;
    const res = await fetch(apiUrl);
    const json = await res.json();
    if(!json?.data) return alert("Invalid playlist response");

    const sessionId = json.data.sessionId;
    const playlistText = json.data.playlist;
    player.sessionId = sessionId;

    const blob = new Blob([playlistText], {type:"application/vnd.apple.mpegurl"});
    const blobUrl = URL.createObjectURL(blob);
    player.blobUrl = blobUrl;

    if(player.hls) { player.hls.destroy(); player.hls=null; }

    if(Hls.isSupported()) {
        player.hls = new Hls({ maxBufferLength:30, maxMaxBufferLength:60, enableWorker:true, lowLatencyMode:true });
        player.hls.loadSource(blobUrl);
        player.hls.attachMedia(player.video);
        player.hls.on(Hls.Events.MANIFEST_PARSED, ()=>player.video.play());
    } else if(player.video.canPlayType('application/vnd.apple.mpegurl')) {
        player.video.src = blobUrl;
        player.video.addEventListener('loadedmetadata', ()=>player.video.play());
    } else { alert("HLS not supported"); }
}





</script>

</body>
</html>
