<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VMS Playback Timeline Test UI</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        body{
            background:#111;
            color:#eee;
            font-family:Arial;
            padding:20px;
        }

        .controls{
            background:#222;
            padding:15px;
            border-radius:8px;
            margin-bottom:20px;
        }

        input,button{
            padding:8px;
            border-radius:6px;
            border:none;
        }

        button{
            cursor:pointer;
            font-weight:bold;
        }

        .playBtn{ background:#28a745;color:#fff;}
        .stopBtn{ background:#dc3545;color:#fff;}

        .camBox{
            background:#222;
            padding:15px;
            border-radius:10px;
            max-width:900px;
            margin:auto;
        }

        video{
            width:100%;
            height:350px;
            background:black;
            border-radius:6px;
        }

        .timelineWrapper{
            margin-top:15px;
        }

        .timelineBar{
            position:relative;
            height:22px;
            background:#555;
            border-radius:6px;
            cursor:pointer;
            overflow:hidden;
        }

        .recordSegment{
            position:absolute;
            height:100%;
            background:#00c853;
        }

        .gapSegment{
            position:absolute;
            height:100%;
            background:#a00000;
        }

        .playhead{
            position:absolute;
            width:2px;
            height:100%;
            background:#fff;
            top:0;
        }

        .timelineTime{
            font-size:14px;
            margin-top:6px;
            text-align:center;
            color:#ccc;
        }
    </style>
</head>

<body>

<div class="controls">
    Camera ID:
    <input type="number" id="cameraId" value="6">
    Start:
    <input type="datetime-local" id="startDt" value="2026-02-05T00:00:00">
    End:
    <input type="datetime-local" id="endDt" value="2026-02-05T23:59:59">
    <button class="playBtn" onclick="startPlayback()">Play</button>
    <button class="stopBtn" onclick="stopPlayback()">Stop</button>
</div>

<div class="camBox">
    <video id="video" controls></video>

    <div class="timelineWrapper">
        <div class="timelineBar" id="timelineBar">
            <div class="playhead" id="playhead"></div>
        </div>
        <div class="timelineTime" id="timelineTime">--</div>
    </div>
</div>

<script>
    const BASE_URL="http://192.168.11.131:8081";
    let hlsInstance=null;

    async function startPlayback(){

        const camId=document.getElementById("cameraId").value;
        const start=document.getElementById("startDt").value;
        const end=document.getElementById("endDt").value;

       const playlistUrl = `${BASE_URL}/api/playback/hls/playlist/${camId}?start=${start}&end=${end}`;

        const res=await fetch(playlistUrl);
        const json=await res.json();

        const playlist=json.data.playlist;

        const blob=new Blob([playlist],{type:"application/vnd.apple.mpegurl"});
        const blobUrl=URL.createObjectURL(blob);

        const video=document.getElementById("video");

        if(hlsInstance){
            hlsInstance.destroy();
            hlsInstance=null;
        }

        if(Hls.isSupported()){
            hlsInstance=new Hls();
            hlsInstance.loadSource(blobUrl);
            hlsInstance.attachMedia(video);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED,function(){
                video.play();
            });
        }else{
            video.src=blobUrl;
        }

        await loadTimeline(camId,start,end);
    }

    function stopPlayback(){
        const video=document.getElementById("video");
        if(hlsInstance){
            hlsInstance.destroy();
            hlsInstance=null;
        }
        video.pause();
        video.removeAttribute("src");
    }

    async function loadTimeline(cameraId,fromDate,toDate){

        const url=${BASE_URL}/api/playback/hls/timeline?cameraId=${cameraId}&fromDate=${fromDate}&toDate=${toDate};

        const res=await fetch(url);
        const json=await res.json();

        drawTimeline(json.data,fromDate,toDate);
    }

    function drawTimeline(segments,fromDate,toDate){

        const bar=document.getElementById("timelineBar");
        bar.innerHTML=<div class="playhead" id="playhead"></div>;

        const start=new Date(fromDate).getTime();
        const end=new Date(toDate).getTime();
        const total=end-start;

        let lastEnd=start;

        segments.forEach(seg=>{

            const segStart=new Date(seg.startTime).getTime();
            const segEnd=new Date(seg.endTime).getTime();

            if(segStart>lastEnd){
                const gapLeft=((lastEnd-start)/total)*100;
                const gapWidth=((segStart-lastEnd)/total)*100;

                const gapDiv=document.createElement("div");
                gapDiv.className="gapSegment";
                gapDiv.style.left=gapLeft+"%";
                gapDiv.style.width=gapWidth+"%";
                bar.appendChild(gapDiv);
            }

            const left=((segStart-start)/total)*100;
            const width=((segEnd-segStart)/total)*100;

            const recDiv=document.createElement("div");
            recDiv.className="recordSegment";
            recDiv.style.left=left+"%";
            recDiv.style.width=width+"%";
            bar.appendChild(recDiv);

            lastEnd=segEnd;
        });

        if(lastEnd<end){
            const gapLeft=((lastEnd-start)/total)*100;
            const gapWidth=((end-lastEnd)/total)*100;

            const gapDiv=document.createElement("div");
            gapDiv.className="gapSegment";
            gapDiv.style.left=gapLeft+"%";
            gapDiv.style.width=gapWidth+"%";
            bar.appendChild(gapDiv);
        }

        bar.onclick=function(e){
            const rect=bar.getBoundingClientRect();
            const percent=(e.clientX-rect.left)/rect.width;
            const clicked=start+(percent*total);
            const offset=(clicked-start)/1000;
            document.getElementById("video").currentTime=offset;
        };

        bar.onmousemove=function(e){
            const rect=bar.getBoundingClientRect();
            const percent=(e.clientX-rect.left)/rect.width;
            const hoverTime=start+(percent*total);
            document.getElementById("timelineTime").innerText=formatTime(new Date(hoverTime));
        };
    }

    setInterval(()=>{
        const video=document.getElementById("video");
        if(!video.duration) return;

        const from=new Date(document.getElementById("startDt").value).getTime();
        const to=new Date(document.getElementById("endDt").value).getTime();
        const total=to-from;

        const currentMs=from+(video.currentTime*1000);
        const percent=((currentMs-from)/total)*100;

        const playhead=document.getElementById("playhead");
        if(playhead) playhead.style.left=percent+"%";

        document.getElementById("timelineTime").innerText=formatTime(new Date(currentMs));
    },500);

    function formatTime(date){
        const yyyy=date.getFullYear();
        const mm=String(date.getMonth()+1).padStart(2,'0');
        const dd=String(date.getDate()).padStart(2,'0');
        const hh=String(date.getHours()).padStart(2,'0');
        const min=String(date.getMinutes()).padStart(2,'0');
        const ss=String(date.getSeconds()).padStart(2,'0');
        return ${yyyy}-${mm}-${dd} ${hh}:${min}:${ss};
    }
</script>

</body>
</html>
